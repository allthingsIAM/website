  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eight: 600 !important;\n    transition: background 0.2s, transform 0.15s !important;\n  }\n  .nav-cta:hover { background: var(--orange-light) !important; color: #000 !important; transform: translateY(-1px); }\n\n  /* ── HERO ── */\n  #hero {\n    min-height: 100vh;\n    display: flex; align-items: center;\n    padding: 100px 5% 80px;\n    position: relative;\n    overflow: hidden;\n  }\n  .hero-bg {\n    position: absolute; inset: 0; pointer-events: none;\n    background:\n      radial-gradient(ellipse 60% 50% at 70% 50%, rgba(44,95,111,0.18) 0%, transparent 70%),\n      radial-gradient(ellipse 40% 40% at 20% 80%, rgba(243,156,18,0.08) 0%, transparent 60%);\n  }\n  .hero-grid {\n    position: absolute; inset: 0; pointer-events: none; opacity: 0.03;\n    background-image: linear-gradient(var(--text) 1px, transparent 1px),\n      linear-gradient(90deg, var(--text) 1px, transparent 1px);\n    background-size: 40px 40px;\n  }\n  .hero-inner {\n    position: relative; z-index: 2;\n    max-width: 760px;\n  }\n  .hero-tag {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: var(--orange-dim);\n    border: 1px solid rgba(243,156,18,0.25);\n    color: var(--orange-light);\n    font-size: 0.78rem;\n    font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    padding: 6px 14px;\n    border-radius: 100px;\n    margin-bottom: 1.5rem;\n    animation: fadeUp 0.6s ease both;\n  }\n  .hero-tag::before {\n    content: '';\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--orange);\n    animation: pulse 2s ease-in-out infinite;\n  }\n  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }\n\n  h1 {\n    font-family: var(--font-head);\n    font-size: clamp(2.8rem, 6vw, 5rem);\n    font-weight: 800;\n    line-height: 1.05;\n    letter-spacing: -0.03em;\n    color: var(--text);\n    margin-bottom: 1.5rem;\n    animation: fadeUp 0.6s 0.1s ease both;\n  }\n  h1 em { font- D, IAM career launchpad, and more. Built by a practitioner — labs, real scenarios, and clear pathways.<\u002Fp>\n        <span class=\"pathway-card__cta\">Browse courses<\u002Fspan>\n      <\u002Fa>\n      <a href=\"#contact\" class=\"pathway-card\" data-tier=\"coach\">\n        <span class=\"pathway-tier\">1:1 · By appointment<\u002Fspan>\n        <h3>Coaching &amp; Career Help<\u002Fh3>\n        <p>Interview prep, resume reviews, and personalized guidance for breaking in or getting promoted. Limited slots each month.<\u002Fp>\n        <span class=\"pathway-card__cta\">Book a session<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"section-divider\"><\u002Fdiv>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"about-grid\">\n    <div class=\"about-img-wrap\">\n      <div class=\"about-img-placeholder\">\n        <img src=\"4b8d3ab6-ccd8-4cd4-b0a8-26c5d1253a9a\" alt=\"Andrew Chanthaphone\" onerror=\"this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#2C5F6F,#0E1217)';this.parentElement.insertAdjacentHTML('beforeend','&lt;div style=&quot;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:5rem;color:rgba(243,156,18,0.5);letter-spacing:-0.05em;&quot;&gt;AC&lt;/div&gt;');\">\n      <\u002Fdiv>\n      <div class=\"about-accent\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"about-text\">\n      <span class=\"section-label\">About Me<\u002Fspan>\n      <h2 class=\"section-title\">Hi, I'm <em style=\"color:var(--orange);font-style:normal\">Andrew.<\u002Fem><\u002Fh2>\n      <p>I'm Andrew Chanthaphone — an IAM practitioner, educator, and <strong>LinkedIn Learning instructor<\u002Fstrong> on a mission to make Identity &amp; Access Management approachable and career-changing for everyone.<\u002Fp>\n      <p>Over my career I've worked across business analyst, project manager, and director-level IAM roles, helping organizations solve complex identity challenges in both the <strong>federal and commercial sectors<\u002Fstrong>. I specialize in Microsoft Entra ID, Okta, and SailPoint, and I've led large-scale tenant-to-tenant migrations in highly regulated environments.<\u002Fp>\n      <p>I've spoken at <strong>Identiverse<\u002Fstrong> and <strong>Cyberjutsu Con<\u002Fstrong>, appeared on podcasts like <em>Identity at the Center<\u002Fem>, and built this community because I believe IAM is one of the most important — and underappreciated — disciplines in cybersecurity today.<\u002Fp>\n      <p>When I'm not creating YouTube videos or course content, I'm hanging out with my family, hitting the gym, or cheering (sometimes booing) my favorite sports teams.<\u002Fp>\n      <div class=\"about-tags\">\n        <span class=\"tag\">Microsoft Entra ID<\u002Fspan>\n        <span class=\"tag\">Okta<\u002Fspan>\n        <span class=\"tag\">SailPoint<\u002Fspan>\n        <span class=\"tag\">Zero Trust<\u002Fspan>\n        <span class=\"tag\">SC-300<\u002Fspan>\n        <span class=\"tag\">AZ-900<\u002Fspan>\n        <span class=\"tag\">Federal IAM<\u002Fspan>\n        <span class=\"tag\">LinkedIn Learning<\u002Fspan>\n        <span class=\"tag\">Conference Speaker<\u002Fspan>\n        <span class=\"tag\">IDPro Member<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:2rem;\">\n        <p style=\"font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;\">Media &amp; Appearances<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:0.5rem;\">\n          <a href=\"https://www.identityatthecenter.com/listen/episode/36226f07/114-getting-into-iam-with-andrew-chanthaphone\" target=\"_blank\" style=\"color:var(--text-muted);font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.2s;\" onmouseover=\"this.style.color='var(--orange)'\" onmouseout=\"this.style.color ════ -->\n<script>\n(function () {\n  const STORAGE_KEY = 'ati.leadmagnet.dismissed';\n  const SUBSCRIBED_KEY = 'ati.leadmagnet.subscribed';\n  const DISMISS_DAYS = 30;\n\n  const backdrop  = document.getElementById('lmModalBackdrop');\n  const closeBtn  = document.getElementById('lmModalClose');\n  const stickybar = document.getElementById('lmStickybar');\n  const stickyCta = document.getElementById('lmStickybarCta');\n  const stickyXBtn = document.getElementById('lmStickybarClose');\n\n  let modalShown = false;\n  let stickyShown = false;\n\n  function isDismissed() {\n    try {\n      if (localStorage.getItem(SUBSCRIBED_KEY) === '1') return true;\n      const v = localStorage.getItem(STORAGE_KEY);\n      if (!v) return false;\n      return (Date.now() - parseInt(v, 10)) < DISMISS_DAYS * 24 * 60 * 60 * 1000;\n    } catch (_) { return false; }\n  }\n  function rememberDismiss() {\n    try { localStorage.setItem(STORAGE_KEY, String(Date.now())); } catch (_) {}\n  }\n  function rememberSubscribe() {\n    try { localStorage.setItem(SUBSCRIBED_KEY, '1'); } catch (_) {}\n  }\n\n  function openModal() {\n    if (modalShown || isDismissed()) return;\n    modalShown = true;\n    backdrop.classList.add('is-open');\n    backdrop.setAttribute('aria-hidden', 'false');\n    document.documentElement.style.overflow = 'hidden';\n    hideStickybar();\n  }\n  function closeModal(remember) {\n    backdrop.classList.remove('is-open');\n    backdrop.setAttribute('aria-hidden', 'true');\n    document.documentElement.style.overflow = '';\n    if (remember) rememberDismiss();\n  }\n  function showStickybar() {\n    if (stickyShown || modalShown || isDismissed()) return;\n    stickyShown = true;\n    stickybar.classList.add('is-visible');\n  }\n  function hideStickybar(remember) {\n    stickybar.classList.remove('is-visible');\n    if (remember) rememberDismiss();\n  }\n\n  // === Triggers ===\n\n  // 1. Time delay — 30s\n  setTimeout(openModal, 30000);\n\n  // 2. Scroll past 50%\n  let scrollFired = false;\n  window.addEventListener('scroll', function () {\n    const scrolled = (window.scrollY + window.innerHeight) / document.body.scrollHeight;\n    if (!scrollFired && scrolled > 0.5) {\n      scrollFired = true;\n      openModal();\n    }\n    if (!stickyShown && scrolled > 0.25 && !modalShown && !isDismissed()) {\n      showStickybar();\n    }\n  }, { passive: true });\n\n  // 3. Exit-intent (desktop only — mouseout to top of viewport)\n  if (window.matchMedia('(pointer: fine)').matches) {\n    document.addEventListener('mouseleave', function (e) {\n      if (e.clientY <= 0) openModal();\n    });\n  }\n\n  // === Dismiss handlers ===\n\n  closeBtn.addEventListener('click', function () { closeModal(true); });\n  backdrop.addEventListener('click', function (e) {\n    if (e.target === backdrop) closeModal(true);\n  });\n  document.addEventListener('keydown', function (e) {\n    if (e.key === 'Escape' && backdrop.classList.contains('is-open')) closeModal(true);\n  });\n\n  stickyCta.addEventListener('click', function () {\n    hideStickybar();\n    // Force the modal open even if previously dismissed (user actively clicked CTA)\n    modalShown = false;\n    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}\n    openModal();\n  });\n  stickyXBtn.addEventListener('click', function () { hideStickybar(true); });\n\n  // === If they actually submit, mark as subscribed and close ===\n  const form = backdrop.querySelector('form');\n  if (form) {\n    form.addEventListener('submit', function () {\n      rememberSubscribe();\n      setTimeout(function () { closeModal(false); }, 800);\n    });\n  }\n\n  // === Nav \"Free Roadmap\" link should also open modal ===\n  document.querySelectorAll('a[href=\"#mailing-list\"]').forEach(function (a) {\n    a.addEventListener('click', function (e) {\n      // Let users still scroll to the inline section if they want; but open modal for nav link\n      if (a.closest('nav')) {\n        e.preventDefault();\n        modalShown = false;\n        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}\n        openModal();\n      }\n    });\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
